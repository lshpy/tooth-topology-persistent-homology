# 치아 위상수학 연구 설정
data:
  # 프로젝트1(06_DENTEX_project)에서 만든 크롭을 재사용
  crops_dir: "../06_DENTEX_project/data/crops"   # class 하위폴더 + split.json
  img_size: 96          # 위상 계산용 (너무 크면 느림)
topo:
  betti_bins: 30        # Betti 곡선 샘플 수
  pim_pixels: 20        # persistence image 해상도(한 변)
  max_dim: 1            # H0, H1
clf:
  n_estimators: 400
  test_ratio: 0.25
  seed: 0
out_dir: "results"
